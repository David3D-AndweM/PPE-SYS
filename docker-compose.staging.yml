version: '3.8'

# Staging environment compose file
# Usage: docker stack deploy -c docker-compose.staging.yml ppe-staging
# Or locally: docker compose -f docker-compose.staging.yml up

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ppe_staging}
      POSTGRES_USER: ${POSTGRES_USER:-ppe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ppe_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ppe-staging

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ppe-staging

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/your-org/ppe-system/backend:develop}
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.staging
      DATABASE_URL: postgresql://${POSTGRES_USER:-ppe_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ppe_staging}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: 'False'
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-staging.ppe-system.internal,api-staging.ppe-system.internal}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://staging.ppe-system.internal}
      SENTRY_DSN: ${SENTRY_DSN_STAGING}
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn -w 4 -b 0.0.0.0:8000 --timeout=120 config.wsgi:application"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - ppe-staging
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure

  celery_worker:
    image: ${BACKEND_IMAGE:-ghcr.io/your-org/ppe-system/backend:develop}
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.staging
      DATABASE_URL: postgresql://${POSTGRES_USER:-ppe_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ppe_staging}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    command: celery -A celery_tasks.app worker -l info -c 4 -Q default,expiry,alerts,stock
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - ppe-staging
    deploy:
      replicas: 1

  celery_beat:
    image: ${BACKEND_IMAGE:-ghcr.io/your-org/ppe-system/backend:develop}
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.staging
      DATABASE_URL: postgresql://${POSTGRES_USER:-ppe_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ppe_staging}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    command: celery -A celery_tasks.app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - ppe-staging

  nginx:
    image: nginx:alpine
    volumes:
      - ./docker/nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - static_staging:/app/staticfiles:ro
      - media_staging:/app/media:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - ppe-staging
    deploy:
      replicas: 1

networks:
  ppe-staging:
    driver: bridge

volumes:
  postgres_staging_data:
  redis_staging_data:
  static_staging:
  media_staging:
