# Backend Testing & Code Quality Configuration

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.development"
python_files = ["test_*.py"]
testpaths = [".", "--ignore=config"]
addopts = """
    --cov=.
    --cov-report=xml
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=80
    -v
    --strict-markers
    --tb=short
    --disable-warnings
"""
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
]

[tool.coverage.run]
source = ["."]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "manage.py",
    "setup.py",
    "*/settings/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "class .*\\(Protocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.black]
line-length = 120
target-version = ["py312"]
include = '\.pyi?$'
extend-exclude = '''
/(
    migrations
  | __pycache__
  | \.git
  | \.venv
  | venv
)/
'''

[tool.isort]
profile = "black"
line_length = 120
skip = ["migrations", "venv"]
known_first_party = ["apps", "config", "core"]

[tool.flake8]
max-line-length = 120
exclude = [
    ".git",
    "__pycache__",
    "migrations",
    ".venv",
    "venv",
]
ignore = ["E203", "E501", "W503"]