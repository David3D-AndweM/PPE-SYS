version: '3.8'

# Production environment compose file
# Usage: docker stack deploy -c docker-compose.prod.yml ppe-prod
# NOTE: For production, use Kubernetes or Docker Swarm with proper HA setup

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ppe_db}
      POSTGRES_USER: ${POSTGRES_USER:-ppe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=200"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ppe_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - ppe-prod
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - ppe-prod
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/your-org/ppe-system/backend:latest}
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgresql://${POSTGRES_USER:-ppe_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ppe_db}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: 'False'
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-ppe-system.app,api.ppe-system.app}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://ppe-system.app}
      SENTRY_DSN: ${SENTRY_DSN}
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn -w 8 -b 0.0.0.0:8000 --timeout=120 --access-logfile - config.wsgi:application"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always
    networks:
      - ppe-prod
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  celery_worker:
    image: ${BACKEND_IMAGE:-ghcr.io/your-org/ppe-system/backend:latest}
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgresql://${POSTGRES_USER:-ppe_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ppe_db}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    command: celery -A celery_tasks.app worker -l info -c 8 -Q default,expiry,alerts,stock --max-tasks-per-child=1000
    depends_on:
      - db
      - redis
    restart: always
    networks:
      - ppe-prod
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  celery_beat:
    image: ${BACKEND_IMAGE:-ghcr.io/your-org/ppe-system/backend:latest}
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgresql://${POSTGRES_USER:-ppe_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ppe_db}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    command: celery -A celery_tasks.app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - db
      - redis
    restart: always
    networks:
      - ppe-prod
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  nginx:
    image: nginx:alpine
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_prod:/app/staticfiles:ro
      - media_prod:/app/media:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    networks:
      - ppe-prod
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          cpus: '0.5'
          memory: 128M

networks:
  ppe-prod:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
  static_prod:
  media_prod:
