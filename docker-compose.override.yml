# Local development overrides — applied automatically by docker compose.
# Do NOT commit this file if it contains secrets.
services:
  backend:
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:8080,http://localhost:3000,http://127.0.0.1:8080

  celery_worker:
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DEBUG=True

  celery_beat:
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DEBUG=True
